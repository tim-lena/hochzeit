<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Getränkekarte</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            width: 100%;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .container {
            max-width: 100%;
            width: 100%;
            max-height: 100vh;
        }
        
        .menu-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            object-fit: contain;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 5px;
            }
            .menu-image {
                border-radius: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img 
            src="getraenke.png" 
            alt="Getränkekarte" 
            class="menu-image"
            loading="lazy"
        >
    </div>
</body>
</html>
